<!doctype html>
<html>
  <head>
    <title>Nearby Places</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <meta charset="utf-8" />
    <link href="../styles.css" type="text/css" rel="stylesheet" />
    <!-- prettier-ignore -->
    <script>
      (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
        key: "{{GOOGLE_MAPS_API_KEY}}",
        v: "weekly",
      });
    </script>
  </head>

  <body>
    <button id="panel-toggle" class="ui-header">Toggle</button>

    <gmp-map zoom="16" map-id="DEMO_MAP_ID"></gmp-map>

    <div class="ui-panel" id="panel">
      <div class="tab">
        <button class="tab-link" data-target="tabLocations">Locations</button>
        <button class="tab-link" data-target="tabPlaces">Places</button>
        <button class="tab-link" data-target="tabEvents">Events</button>
      </div>

      <div class="tab-content" id="tabLocations">
        <div class="controls">
          <input
            type="button"
            id="get-position"
            class="controls-button"
            value="Get my location"
          />

          <div class="or"><strong>Or</strong></div>

          <input
            type="text"
            class="query-input"
            id="address"
            placeholder="Enter an address"
          />
          <input
            type="button"
            id="submit"
            class="controls-button"
            value="Find address"
          />
          <input
            type="button"
            id="clear"
            class="controls-button"
            value="Clear"
          />
        </div>
        <h3>Your Locations</h3>
        <div id="locations-own"></div>
        <h3>Other Locations</h3>
        <div id="locations-others"></div>
      </div>

      <div class="tab-content" id="tabPlaces">
        <div class="controls">
          <div class="controls-row">
            <label>Radius</label>
            <input type="text" class="input-radius" id="set-radius" value="" />
            <input
              type="button"
              id="radius-plus"
              class="controls-button radius-control"
              value="+"
            />
            <input
              type="button"
              id="radius-minus"
              class="controls-button radius-control"
              value="-"
            />
          </div>
          <div class="controls-row">
            <label>Type</label>
            <select id="set-type" class="controls-select">
              <option value="restaurant">Restaurant</option>
              <option value="bar">Bar</option>
              <option value="cafe">Cafe</option>
            </select>
          </div>
          <div class="controls-row">
            <label>Open now?</label>
            <select id="set-opennow" class="controls-select">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>

          <input
            type="button"
            id="search"
            class="controls-button"
            value="Search Places"
          />
        </div>
        <div class="list-container">
          <h3>Places</h3>
          <div id="search-error"></div>
          <div id="search-loading">Loading...</div>
          <div id="search-results"></div>
        </div>
      </div>

      <div class="tab-content" id="tabEvents">
        <h3>Events</h3>
        <div id="events"></div>
      </div>
    </div>

    <script src="../app.js"></script>
  </body>
</html>
