<!doctype html>
<html>
  <head>
    <title>Nearby Places</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <meta charset="utf-8" />
    <link href="../styles.css" type="text/css" rel="stylesheet" />
    <!-- prettier-ignore -->
    <script>
      (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
        key: "{{GOOGLE_MAPS_API_KEY}}",
        v: "weekly",
      });
    </script>
  </head>

  <body>
    <div class="container">
      <gmp-map zoom="16" map-id="DEMO_MAP_ID"></gmp-map>
      <div class="ui-panel">
        <div class="panel-top">
          <div class="tab">
            <button class="tab-link" data-target="tabLocations">
              Locations
            </button>
            <button class="tab-link" data-target="tabPlaces">Places</button>
          </div>

          <div class="tab-content" id="tabLocations">
            <div class="controls">
              <input
                type="text"
                class="query-input"
                id="address"
                placeholder="Enter an address"
              />
              <input
                type="button"
                id="submit"
                class="controls-button"
                value="Find address"
              />
              <input
                type="button"
                id="clear"
                class="controls-button"
                value="Clear"
              />

              <span><strong>Or</strong></span>
              <input
                type="button"
                id="get-position"
                class="controls-button"
                value="Get my location"
              />
            </div>
            <h3>Your Locations</h3>
            <div id="locations-own"></div>
            <h3>Other Locations</h3>
            <div id="locations-others"></div>
          </div>

          <div class="tab-content" id="tabPlaces">
            <div class="controls">
              <input
                type="button"
                id="search"
                class="controls-button"
                value="Search Places"
              />
            </div>
            <div class="list-container">
              <h3>Places</h3>
              <div id="search-error"></div>
              <div id="search-loading">Loading...</div>
              <div id="search-results"></div>
            </div>
          </div>
        </div>

        <div class="panel-bottom">
          <div class="panel-content">
            <h3>Events</h3>
            <div id="events"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="../app.js"></script>
  </body>
</html>
