<!doctype html>
<html>
  <head>
    <title>Nearby Places</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <meta charset="utf-8" />
    <link href="../styles.css" type="text/css" rel="stylesheet" />
    <!-- prettier-ignore -->
    <script>
      (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Ignoring:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
        key: "{{GOOGLE_MAPS_API_KEY}}",
        v: "weekly",
      });
    </script>
  </head>

  <body>
    <div class="header">
      <div class="app-errors" id="app-errors"></div>
      <button id="location-panel-toggle" class="ui-header set-my-location">
        Set location
      </button>
      <button id="places-panel-toggle" class="ui-header search-places">
        Search places
      </button>

      <div class="panel-top" id="location-panel">
        <div class="panel-inner panel-cols">
          <div class="panel-row">
            <input type="button" id="get-position" class="" value="GPS" />
            <strong>Or</strong>
            <input
              type="text"
              class=""
              id="address"
              placeholder="Enter an address"
            />
            <input type="button" id="submit" class="" value="Find" />
            <input type="button" id="clear" class="" value="Clear" />
          </div>
          <div class="panel-row">
            <div id="address-error"></div>
          </div>
        </div>
      </div>

      <div class="panel-top" id="places-panel">
        <div class="panel-inner panel-cols">
          <div class="panel-row">
            <label>Radius</label>
            <input type="text" class="set-radius" id="set-radius" value="" />
            <input
              type="button"
              id="radius-plus"
              class="controls-button radius-control"
              value="+"
            />
            <input
              type="button"
              id="radius-minus"
              class="controls-button radius-control"
              value="-"
            />
          </div>
          <div class="panel-row">
            <label>Type</label>
            <select id="set-type" class="">
              <option value="restaurant">Restaurant</option>
              <option value="bar">Bar</option>
              <option value="cafe">Cafe</option>
            </select>
            <label>Open now?</label>
            <select id="set-opennow" class="">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>
          <div class="panel-row">
            <input type="button" id="search" class="" value="Search Places" />
          </div>
          <div class="panel-row">
            <div id="search-error"></div>
          </div>
        </div>
      </div>
    </div>

    <gmp-map zoom="16" map-id="DEMO_MAP_ID"></gmp-map>

    <script src="../app.js"></script>
  </body>
</html>
