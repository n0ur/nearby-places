<!doctype html>
<html>
  <head>
    <title>Nearby Places</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <meta charset="utf-8" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: "sans-serif";
      }
      header {
        padding: 16px 8px;
        background: #eee;
      }
      #session-wrapper {
        padding: 16px 8px;
      }
      #enter-session {
        background-color: #1a73e8;
        color: white;
        border: 0;
        border-radius: 2px;
        box-shadow: 0 1px 4px -1px rgba(0, 0, 0, 0.3);
        height: 40px;
        cursor: pointer;
        margin-right: 8px;
        padding: 0 15px;
      }
      #session-id {
        padding: 10px;
        margin: 5px 0;
        box-sizing: border-box;
        width: 150px;
      }
    </style>
  </head>

  <body>
    <header>Nearby places</header>

    <form id="session-wrapper">
      Session ID: <input type="text" id="session-id" value="" />
      <input type="submit" id="enter-session" value="Enter" />
    </form>
  </body>

  <script>
    const shortId = Math.random().toString(36).slice(2, 12);
    document.getElementById("session-id").value = shortId;
    document
      .getElementById("session-wrapper")
      .addEventListener("submit", (e) => {
        const shortId = document.getElementById("session-id").value;
        location.href = `/map/${shortId}`;
        e.preventDefault();
        return false;
      });
  </script>
</html>
