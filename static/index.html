<!doctype html>
<html>
  <head>
    <title>Nearby Places</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <meta charset="utf-8" />
    <link href="./styles.css" rel="stylesheet" />
    <script>
      ((g) => {
        var h,
          a,
          k,
          p = "The Google Maps JavaScript API",
          c = "google",
          l = "importLibrary",
          q = "__ib__",
          m = document,
          b = window;
        b = b[c] || (b[c] = {});
        var d = b.maps || (b.maps = {}),
          r = new Set(),
          e = new URLSearchParams(),
          u = () =>
            h ||
            (h = new Promise(async (f, n) => {
              await (a = m.createElement("script"));
              e.set("libraries", [...r] + "");
              for (k in g)
                e.set(
                  k.replace(/[A-Z]/g, (t) => "_" + t[0].toLowerCase()),
                  g[k],
                );
              e.set("callback", c + ".maps." + q);
              a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
              d[q] = f;
              a.onerror = () => (h = n(Error(p + " could not load.")));
              a.nonce = m.querySelector("script[nonce]")?.nonce || "";
              m.head.append(a);
            }));
        d[l]
          ? console.warn(p + " only loads once. Ignoring:", g)
          : (d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)));
      })({
        key: "{{GOOGLE_MAPS_API_KEY}}",
        v: "weekly",
        libraries: "places,geometry,marker,geocoding",
      });
    </script>
  </head>

  <body>
    <gmp-map zoom="16" map-id="DEMO_MAP_ID">
      <div id="floating-panel" slot="control-block-start-inline-start">
        <input
          type="text"
          id="address"
          placeholder="Enter an address or click the map to reverse geocode."
        />
        <br />
        <input type="button" id="submit" value="Geocode" />
        <input type="button" id="clear" value="Clear" />
        <br />
      </div>
      <div id="response-container" slot="control-block-start-inline-end">
        Addresses show here: (click to delete) <br />
        <div id="response"></div>
      </div>
    </gmp-map>
  </body>
  <script src="./app.js"></script>
</html>
